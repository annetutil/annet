vendor: sitonica
before: |
  bgp 4200000000
    graceful-restart
    non-stop-routing
    router-id 192.0.2.69
    address-family ipv6 unicast
      balance 128
      balance as-path-relax
      forwarding-conversational-learning route-policy RM6_BEISH
      import-route direct route-policy RM6_JER
      network 2001:DB8:1:: 64 route-policy RM6_TOZOK
      aggregate 2001:DB8:1:: 64 detail-suppressed
after: |
  bgp 4200000000
    address-family ipv6 unicast
patch: |
  system-view
  bgp 4200000000
    undo router-id
    undo non-stop-routing
    undo graceful-restart
    address-family ipv6 unicast
      undo aggregate 2001:DB8:1:: 64
      undo network 2001:DB8:1:: 64
      undo import-route direct
      undo forwarding-conversational-learning
      undo balance
      undo balance as-path-relax
      quit
    quit
  save force
