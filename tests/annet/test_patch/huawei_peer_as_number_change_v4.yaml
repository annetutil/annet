- vendor: huawei
  before: |
    bgp 65536
     peer 192.0.2.1 as-number 12345
     ipv4-family unicast
      peer 192.0.2.1 enable
      peer 192.0.2.1 route-policy DENY_ALL import
  after: |
    bgp 65536
     peer 192.0.2.1 as-number 2
     ipv4-family unicast
      peer 192.0.2.1 enable
      peer 192.0.2.1 route-policy DENY_ALL import
  patch: |
    system-view
    bgp 65536
      undo peer 192.0.2.1
      peer 192.0.2.1 as-number 2
      ipv4-family unicast
        peer 192.0.2.1 enable
        peer 192.0.2.1 route-policy DENY_ALL import
        quit
      quit
    q
    save
