test_case_1:
    child: |
      %inherit_from=parent
      rule 1
          dialog: ChildSome1 ::: Answer
      rule 2
          dialog: ChildSome2 ::: Answer
    parent: |
      rule 1
        dialog: ParentSome1 ::: Answer
      rule 3
        dialog: ParentSome2 ::: Answer
    expected: |
      rule 1
        dialog: ParentSome1 ::: Answer
        dialog: ChildSome1 ::: Answer
      rule 2
        dialog: ChildSome2 ::: Answer
      rule 3
        dialog: ParentSome2 ::: Answer

