    parent: |
        rule 1 %ifcontext=some:context1
            some 3
        rule 1 %ifcontext=some:context2
            some 4
    expected: |
        rule 1 %ifcontext=some:context1
            some 3
            some 1
        rule 1 %ifcontext=some:context2
            some 4
