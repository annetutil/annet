test_case_5:
    child: |
        %inherit_from=parent
        rule 1 %ifcontext=some:context %not_inherit
        rule 2 %ifcontext=some:context
            some 2
        rule 1 %ifcontext=some:context1
            some 3
        rule 2 %ifcontext=some:context1 %not_inherit
            some 4
    parent: |
        rule 1 %ifcontext=some:context
            some 5
        rule 2 %ifcontext=some:context
            some 6
        rule 1 %ifcontext=some:context1
            some 7
        rule 2 %ifcontext=some:context1
            some 8
    expected: |
        rule 2 %ifcontext=some:context
            some 6
            some 2
        rule 1 %ifcontext=some:context1
            some 7
            some 3
        rule 2 %ifcontext=some:context1
            some 4
