      %inherit_from=parent
      rule 1
          rule 2 %not_inherit
            dialog: Child1 ::: Answer
            rule 3
          rule 4
            dialog: Parent4 ::: Answer %not_inherit
            rule 4.1
              dialog: Child2 ::: Answer
          rule 5
            dialog: Child3 ::: Answer
            rule 5.1 %not_inherit
  parent: |
      rule 1
          dialog: Parent1 ::: Answer
          rule 2
              dialog: Parent2 ::: Answer
              rule 3
                  dialog: Parent3 ::: Answer
          rule 4
            dialog: Parent4 ::: Answer
            rule 4.1
                dialog: Parent5 ::: Answer
          rule 5
              rule 5.1
                  dialog: Parent6 ::: Answer
  expected: |
      rule 1
          dialog: Parent1 ::: Answer
          rule 2
              dialog: Child1 ::: Answer
              rule 3
          rule 4
              rule 4.1
                  dialog: Parent5 ::: Answer
                  dialog: Child2 ::: Answer
          rule 5
              dialog: Child3 ::: Answerd

test_case_4:
    child: |
        %inherit_from=parent
        rule 1 %ifcontext=some:context
            subrule 1
        rule 2 %ifcontext=some:context2 %not_inherit
    parent: |
        rule 1 %ifcontext=some:context
            subrule 2
        rule 2 %ifcontext=some:context2
            subrule 1
        rule 2
        rule 3 %ifcontext=some:context2
    expected: |
        rule 1 %ifcontext=some:context
            subrule 1
            subrule 2
        rule 2
        rule 3 %ifcontext=some:context2
