test_case_1:
    child: |
        %inherit_from=parent
        some 1
            some 2
                some 3 %not_inherit
                    some 4
                    some 5 %not_inherit
    parent: |
        some 2
    expected: |
        some 2
        some 1
            some 2
                some 3
                    some 4

test_case_2:
    child: |
      %inherit_from=parent
      rule 1
          dialog: Child1 ::: Answer
      rule 2
          dialog: Parent2 ::: Answer %not_inherit
          subrule 1 %not_inherit
              dialog: Child3 ::: Answer
          dialog: Child4 ::: Answer
    parent: |
      rule 1
          dialog: Parent1 ::: Answer
      rule 2
          dialog: Parent2 ::: Answer
          subrule 1
              dialog: Parent3 ::: Answer
          dialog: Parent4 ::: Answer
    expected: |
      rule 1
          dialog: Child1 ::: Answer
          dialog: Parent1 ::: Answer
      rule 2
          subrule 1
            dialog: Child3 ::: Answer
          dialog: Parent4 ::: Answer
          dialog: Child4 ::: Answer
 
test_case_3:
