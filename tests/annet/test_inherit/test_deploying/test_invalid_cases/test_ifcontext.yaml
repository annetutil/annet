test_case_1:
  child: |
    %inherit_from=parent
    rule 1 %ifcontext=context:1,context:2
      some 1 %ifcontext=context:3
  parent: |
    rule 1 %ifcontext=context:1,context:2
      some 1 %ifcontext=context:4
  error_message: The rule some 1 %ifcontext=context:4 specifies a %ifcontext not present in the parent rules.

