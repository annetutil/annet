test_case_1:
    child: |
        %inherit_from=parent
        rule 1 %scope=scope2,scope3
            child 2
        rule 1 %scope=scope1
            child 1
            child 3
        rule 2
        rule 3
    parent: |
        rule 1 %scope=scope2,scope3
            parent 2
        rule 1 %scope=scope1
            parent 2
        rule 3
    expected: |
        rule 1 %scope=scope2,scope3
            child 2
            parent 2
        rule 1 %scope=scope1
            child 1
            child 3
            parent 2
        rule 2
        rule 3

test_case_2:
    child: |
        %inherit_from=parent
        rule 1 %scope=scope
            some 1
        rule 1 %scope=scope
            some 2
    parent: |
        rule 1 %scope=scope
            some 3
        rule 1 %scope=scope
            some 4
    expected: |
        rule 1 %scope=scope
            some 1
            some 2
            some 3
            some 4

