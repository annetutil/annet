test_case_5:
    child: |
        %inherit_from=parent
        rule 1 %scope=scope %not_inherit
        rule 2 %scope=scope
            some 2
        rule 1 %scope=scope1
            some 3
        rule 2 %scope=scope1 %not_inherit
            some 4
    parent: |
        rule 1 %scope=scope
            some 5
        rule 2 %scope=scope
            some 6
        rule 1 %scope=scope1
            some 7
        rule 2 %scope=scope1
            some 8
    expected: |
        rule 2 %scope=scope
            some 2
            some 6
        rule 1 %scope=scope1
            some 3
            some 7
        rule 2 %scope=scope1
            some 4

test_case_6:
    child: |
        %inherit_from=parent
        rule 1 %scope=scope1,scope2
            rule 2 %scope=scope1
            rule 2 %scope=scope2
            rule 2 %scope=scope1,scope2
    parent: |
        rule 1 %scope=scope3,scope4
            rule 2 %scope=scope3
            rule 2 %scope=scope4
            rule 2 %scope=scope3,scope4
    expected: |
        rule 1 %scope=scope1,scope2
            rule 2 %scope=scope1
            rule 2 %scope=scope2
            rule 2 %scope=scope1,scope2
        rule 1 %scope=scope3,scope4
            rule 2 %scope=scope3
            rule 2 %scope=scope4
            rule 2 %scope=scope3,scope4
