    %inherit_from=parent
    rule 1
      subrule 1
        some 1
        some 3
      subrule 2 %insert_to_end_group
    rule 2
  parent: |
    rule 0
      subrule 1
    rule 1
      subrule 1
        some 1
        some 2
      subrule 3
      subrule 4
    rule 3
  expected: |
    rule 0
      subrule 1
    rule 1
      subrule 1
        some 1
        some 3
        some 2
      subrule 3
      subrule 4
      subrule 2
    rule 2
    rule 3

