test_case_1:
  child: |
    %inherit_from=parent
    rule 1
    rule 3
    rule 1
    rule 4
  parent: |
    rule 1 %split
    rule 2
    rule 1 %split
  expected: |
    rule 1 %split
    rule 3
    rule 2
    rule 1 %split
    rule 4

test_case_2:
  child: |
    %inherit_from=parent
    rule 1 %split %insert_to_end_group
      first
    rule 3
    rule 1 %split
      second
    rule 2
    rule 1 %split
      third
  parent: |
    rule 4
    rule 5
    rule 6
    rule 2
    rule 7
    rule 8
  expected: |
    rule 3
    rule 1 %split
      second
    rule 4
    rule 5
    rule 6
    rule 2
    rule 1 %split
      third
    rule 7
    rule 8
    rule 1 %split
      first

test_case_3:
  child: |
    %inherit_from=parent
    rule 2 %not_inherit
    rule 1
    rule 3
  parent: |
    rule 2 %split
    rule 1
    rule 2 %split
    rule 3
    rule 2 %split

  expected: |
    rule 1
    rule 3

test_case_4:
  child: |
    %inherit_from=parent
    rule 1
      subrule 1 %not_inherit
      some
  parent: |
    rule 1 %split
      subrule 1
    rule 2
    rule 1 %split
      subrule 1
  expected: |
    rule 1 %split
      some
    rule 2
    rule 1 %split
      subrule 1

test_case_5:
  child: |
    %inherit_from=parent
    rule 1
    rule 2
    rule 1
      subrule 1 %not_inherit
      some
  parent: |
    rule 1 %split
      subrule 1
    rule 2
    rule 1 %split
      subrule 1
  expected: |
    rule 1 %split
      subrule 1
    rule 2
    rule 1 %split
      some

