generators:
  default:
    - annet_generators.example
    - annet_generators.mesh_example
    - annet_generators.rpl_example

storage:
  default:
    adapter: netbox

# Optionally override the rulebook module path (defaults to annet.rulebook.texts).
# Uncomment the section below and add `rulebook: default` under the context to enable it.
# rulebook:
#   default:
#     module: annet.rulebook.texts

context:
  default:
    generators: default
    storage: default

selected_context: default
